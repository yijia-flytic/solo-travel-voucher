<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Little Something For You ✈</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EC;
    --gold: #C5975B;
    --gold-light: #E8D5B7;
    --gold-dark: #8B6914;
    --ink: #2C2420;
    --ink-light: #6B5E56;
    --rose: #D4847C;
    --rose-light: #F2D4D0;
    --sage: #8FA68A;
    --paper: #FAF3E8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    background: var(--cream);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(197,151,91,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(212,132,124,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(143,166,138,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ===== PHASE 0: ENVELOPE ===== */
  .envelope-scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .envelope-scene.hidden {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
  }

  .envelope-label {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .envelope {
    width: 300px;
    height: 200px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    animation: envelopeFloat 3s ease-in-out infinite;
  }

  .envelope:hover { animation-play-state: paused; }

  @keyframes envelopeFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-8px) rotate(1deg); }
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #F5E6D0, #EDD9BF);
    border-radius: 4px;
    box-shadow:
      0 2px 20px rgba(139,105,20,0.15),
      0 10px 40px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.5);
    overflow: hidden;
  }

  .envelope-body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(to top, rgba(197,151,91,0.08), transparent);
  }

  .envelope-seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    background: radial-gradient(circle, var(--gold), var(--gold-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    box-shadow: 0 2px 8px rgba(139,105,20,0.3), inset 0 1px 2px rgba(255,255,255,0.3);
  }

  .envelope-seal::after {
    content: '✈';
    font-size: 22px;
    filter: brightness(1.5);
  }

  .envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, #E8D5B7, #EDD9BF);
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top center;
    transition: transform 0.6s ease;
    z-index: 1;
  }

  .envelope:hover .envelope-flap {
    transform: rotateX(20deg);
  }

  .tap-hint {
    margin-top: 40px;
    color: var(--ink-light);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }

  .tap-hint span {
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== PHASE 1: VOUCHER ===== */
  .voucher-scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease 0.4s;
    z-index: 50;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .voucher-scene.active {
    opacity: 1;
    pointer-events: auto;
  }

  .voucher-card {
    width: 100%;
    max-width: 380px;
    background: var(--paper);
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 4px 30px rgba(139,105,20,0.12),
      0 20px 60px rgba(0,0,0,0.06);
    position: relative;
    transform: translateY(30px);
    opacity: 0;
    animation: none;
    flex-shrink: 0;
  }

  .voucher-scene.active .voucher-card {
    animation: cardReveal 0.8s ease 0.6s forwards;
  }

  @keyframes cardReveal {
    from { transform: translateY(30px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .voucher-header {
    background: linear-gradient(135deg, var(--ink) 0%, #3D332D 100%);
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .voucher-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 200px;
    height: 200px;
    border: 1px solid rgba(197,151,91,0.15);
    border-radius: 50%;
  }

  .voucher-header::after {
    content: '';
    position: absolute;
    bottom: -80%;
    left: -20%;
    width: 250px;
    height: 250px;
    border: 1px solid rgba(197,151,91,0.1);
    border-radius: 50%;
  }

  .voucher-airline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .voucher-logo {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .voucher-class {
    background: rgba(197,151,91,0.15);
    color: var(--gold-light);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .voucher-title {
    font-family: 'Playfair Display', serif;
    color: #FFF;
    font-size: 26px;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .voucher-subtitle {
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .voucher-tear {
    position: relative;
    height: 1px;
    background: repeating-linear-gradient(
      90deg,
      var(--gold-light) 0,
      var(--gold-light) 6px,
      transparent 6px,
      transparent 12px
    );
    opacity: 0.4;
  }

  .voucher-tear::before,
  .voucher-tear::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 20px;
    height: 20px;
    background: var(--cream);
    border-radius: 50%;
    transform: translateY(-50%);
  }
  .voucher-tear::before { left: -10px; }
  .voucher-tear::after { right: -10px; }

  .voucher-details {
    padding: 24px 28px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .detail-item label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .detail-item value {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  .detail-item.destination value {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--rose);
  }

  .voucher-includes {
    background: rgba(197,151,91,0.06);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 4px 0 20px;
  }

  .includes-title {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .includes-list {
    display: flex;
    gap: 16px;
  }

  .includes-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink);
    font-weight: 400;
  }

  .includes-icon {
    font-size: 16px;
  }

  .voucher-message {
    text-align: center;
    padding: 0 10px;
    margin-bottom: 24px;
  }

  .voucher-message p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink-light);
    font-weight: 300;
  }

  .voucher-message .highlight {
    color: var(--rose);
    font-weight: 500;
  }

  /* Redeem Button */
  .redeem-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 12px;
    color: #FFF;
    font-family: 'Noto Sans TC', 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .redeem-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(197,151,91,0.4);
  }

  .redeem-btn:active {
    transform: translateY(0);
  }

  .redeem-btn.redeemed {
    background: linear-gradient(135deg, var(--sage), #6B8F65);
    letter-spacing: 2px;
    cursor: default;
  }

  .redeem-btn .shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 2.5s infinite;
  }

  .redeem-btn.redeemed .shimmer {
    display: none;
  }

  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  /* ===== APPLE WALLET BUTTON ===== */
  .wallet-section {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                opacity 0.5s ease 0.2s;
  }

  .wallet-section.visible {
    max-height: 200px;
    opacity: 1;
  }

  .wallet-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .wallet-divider::before,
  .wallet-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(107,94,86,0.15);
  }

  .wallet-divider span {
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 400;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .wallet-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 20px;
    background: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    text-decoration: none;
  }

  .wallet-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  .wallet-btn:active {
    transform: translateY(0);
  }

  .wallet-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .wallet-btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1;
  }

  .wallet-btn-text .top {
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    font-family: -apple-system, 'SF Pro Text', 'DM Sans', sans-serif;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .wallet-btn-text .bottom {
    font-size: 16px;
    color: #FFF;
    font-family: -apple-system, 'SF Pro Display', 'DM Sans', sans-serif;
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: -0.2px;
  }

  .wallet-note {
    font-size: 11px;
    color: var(--ink-light);
    opacity: 0.6;
    text-align: center;
    line-height: 1.4;
  }

  .voucher-footer {
    padding: 16px 28px 24px;
  }

  .voucher-barcode {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5px;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  .bar {
    height: 30px;
    background: var(--ink);
    border-radius: 1px;
  }

  .voucher-serial {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 3px;
    opacity: 0.5;
  }

  /* ===== STAMP OVERLAY ===== */
  .redeemed-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .redeemed-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .stamp {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: var(--rose);
    border: 4px solid var(--rose);
    border-radius: 12px;
    padding: 12px 32px;
    transform: rotate(-15deg) scale(0);
    opacity: 0;
    background: rgba(253,246,236,0.95);
    white-space: nowrap;
    transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.3s ease;
  }

  .redeemed-overlay.active .stamp {
    transform: rotate(-15deg) scale(1);
    opacity: 1;
  }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 300;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -10px;
    opacity: 0;
  }

  .confetti.active {
    animation: confettiFall var(--duration) ease-out forwards;
    opacity: 1;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(0) rotate(0deg) scale(1);
      opacity: 1;
    }
    80% { opacity: 1; }
    100% {
      transform: translateY(100vh) rotate(var(--rotation)) scale(0.5);
      opacity: 0;
    }
  }

  @media (max-width: 400px) {
    .voucher-title { font-size: 22px; }
    .voucher-header { padding: 22px 22px 20px; }
    .voucher-details { padding: 20px 22px; }
    .voucher-footer { padding: 14px 22px 20px; }
    .includes-list { gap: 10px; }
    .stamp { font-size: 36px; padding: 10px 24px; }
  }
</style>
</head>
<body>

<!-- PHASE 0: Envelope -->
<div class="envelope-scene" id="envelopeScene">
  <div class="envelope-label">For Alison</div>
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-seal"></div>
    <div class="envelope-flap"></div>
  </div>
  <div class="tap-hint"><span>輕觸打開</span></div>
</div>

<!-- PHASE 1: Voucher -->
<div class="voucher-scene" id="voucherScene">
  <div class="voucher-card">
    <div class="voucher-header">
      <div class="voucher-airline">
        <div class="voucher-logo">Solo Travel</div>
        <div class="voucher-class">Unlimited</div>
      </div>
      <div class="voucher-title">獨旅兌換券</div>
      <div class="voucher-subtitle">Solo Trip Voucher — Flight + Hotel Included</div>
    </div>

    <div class="voucher-tear"></div>

    <div class="voucher-details">
      <div class="detail-row">
        <div class="detail-item">
          <label>Passenger</label>
          <value>Alison ♡</value>
        </div>
        <div class="detail-item">
          <label>Valid Until</label>
          <value>永久有效</value>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-item destination">
          <label>Destination</label>
          <value>你想去哪就去哪</value>
        </div>
      </div>

      <div class="voucher-includes">
        <div class="includes-title">此券包含</div>
        <div class="includes-list">
          <div class="includes-item"><span class="includes-icon">✈️</span> 來回機票</div>
          <div class="includes-item"><span class="includes-icon">🏨</span> 住宿</div>
          <div class="includes-item"><span class="includes-icon">💛</span> 滿滿的小尾巴</div>
        </div>
      </div>

      <div class="voucher-message">
        <p>
          想去哪裡就去哪裡<br>
          一個人的旅行 是送給自己的禮物<br>
          <span class="highlight">機加酒我全包 妳只需要出發</span>
        </p>
      </div>

      <button class="redeem-btn" id="redeemBtn" onclick="redeem()">
        <span class="shimmer"></span>
        核 銷 兌 換
      </button>

      <!-- Apple Wallet section (hidden until redeemed) -->
      <div class="wallet-section" id="walletSection">
        <div class="wallet-divider">
          <span>收藏這張票券</span>
        </div>

        <a class="wallet-btn" id="walletBtn" href="#" onclick="addToWallet(event)">
          <!-- Apple Wallet icon (inline SVG) -->
          <svg class="wallet-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="3" fill="#1A1A1A" stroke="#555" stroke-width="0.5"/>
            <rect x="2" y="4" width="20" height="4" rx="2" fill="#FF3B30"/>
            <rect x="2" y="7.5" width="20" height="4" rx="0" fill="#FF9500"/>
            <rect x="2" y="11" width="20" height="4" rx="0" fill="#FFCC00"/>
            <rect x="2" y="14.5" width="20" height="5.5" rx="0 0 3 3" fill="#34C759"/>
            <rect x="2" y="14.5" width="20" height="2" fill="#34C759"/>
            <rect x="2" y="16" width="20" height="4" rx="3" fill="#007AFF"/>
          </svg>
          <div class="wallet-btn-text">
            <span class="top">Add to</span>
            <span class="bottom">Apple Wallet</span>
          </div>
        </a>

        <div class="wallet-note">加入後可在 Wallet 中隨時查看</div>
      </div>
    </div>

    <div class="voucher-footer">
      <div class="voucher-barcode" id="barcode"></div>
      <div class="voucher-serial">BDAY-20260404-LOVE</div>
    </div>
  </div>
</div>

<!-- Stamp overlay -->
<div class="redeemed-overlay" id="redeemedOverlay">
  <div class="stamp">已兌換 ✈</div>
</div>

<!-- Confetti -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
  // Generate barcode
  const barcode = document.getElementById('barcode');
  for (let i = 0; i < 50; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.width = (Math.random() > 0.5 ? 2 : 1) + 'px';
    barcode.appendChild(bar);
  }

  // Open envelope
  function openEnvelope() {
    document.getElementById('envelopeScene').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('voucherScene').classList.add('active');
    }, 200);
  }

  // Redeem
  let redeemed = false;
  function redeem() {
    if (redeemed) return;
    redeemed = true;

    const btn = document.getElementById('redeemBtn');
    btn.classList.add('redeemed');
    btn.innerHTML = '✓ 已兌換 — 準備出發吧！';

    launchConfetti();

    // Show stamp
    setTimeout(() => {
      document.getElementById('redeemedOverlay').classList.add('active');
    }, 600);

    // Hide stamp, then reveal wallet button
    setTimeout(() => {
      document.getElementById('redeemedOverlay').classList.remove('active');
    }, 2600);

    setTimeout(() => {
      document.getElementById('walletSection').classList.add('visible');
    }, 3000);
  }

  // Add to wallet handler
  // In production, this href should point to your .pkpass file URL:
  // e.g., https://your-domain.com/pass/solo-travel.pkpass
  function addToWallet(e) {
    e.preventDefault();
    
    // ====================================================
    // 部署時把下面這行改成你的 .pkpass 檔案的實際 URL
    // window.location.href = 'https://your-domain.com/pass/solo-travel.pkpass';
    // ====================================================
    
    alert('🎉 部署後這裡會自動下載 .pkpass 檔並加入 Apple Wallet！\n\n請將按鈕連結指向你的 .pkpass 檔案 URL。');
  }

  // Confetti
  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#C5975B', '#D4847C', '#8FA68A', '#E8D5B7', '#F2D4D0', '#FFD700', '#FF6B8A'];

    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 6 + Math.random() * 8;
      const left = Math.random() * 100;
      const duration = 2 + Math.random() * 2;
      const delay = Math.random() * 0.8;
      const rotation = (Math.random() - 0.5) * 720;

      el.style.cssText = `
        left: ${left}%;
        width: ${size}px;
        height: ${size}px;
        background: ${color};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        --duration: ${duration}s;
        --rotation: ${rotation}deg;
        animation-delay: ${delay}s;
      `;

      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('active'));
      setTimeout(() => el.remove(), (duration + delay) * 1000 + 500);
    }
  }
</script>
